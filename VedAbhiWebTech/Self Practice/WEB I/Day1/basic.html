<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sample User Form</title>
    <style>
        /* Basic styling for better readability */
        body { font-family: sans-serif; margin: 40px; line-height: 1.6; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; }
        input[type="text"], input[type="email"], select, textarea {
            width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px;
        }
        .radio-group { margin-top: 5px; }
        button { background: #007bff; color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; }
        button:hover { background: #0056b3; }
    </style>
</head>
<body>

    <h2>User Registration Form</h2>

    <form action="/submit-form-handler" method="POST">

        <div class="form-group">
            <label for="first-name">Full Name:</label>
            <input type="text" id="first-name" name="user_name" placeholder="John Doe" required>
        </div>

        <div class="form-group">
            <label for="user-email">Email Address:</label>
            <input type="email" id="user-email" name="user_email" placeholder="john@example.com" required>
        </div>

        <div class="form-group">
            <label for="subject">Reason for Contact:</label>
            <select id="subject" name="subject">
                <option value="general">General Inquiry</option>
                <option value="support">Technical Support</option>
                <option value="billing">Billing Issue</option>
            </select>
        </div>

        <div class="form-group">
            <label>Preferred Contact Method:</label>
            <div class="radio-group">
                <input type="radio" id="contact-email" name="contact_pref" value="email" checked>
                <label style="display:inline;" for="contact-email">Email</label>
                
                <input type="radio" id="contact-phone" name="contact_pref" value="phone">
                <label style="display:inline;" for="contact-phone">Phone</label>
            </div>
        </div>

        <div class="form-group">
            <label for="message">Message:</label>
            <textarea id="message" name="user_message" rows="5"></textarea>
        </div>

        <button type="submit">Send Message</button>

    </form>

</body>
</html>
