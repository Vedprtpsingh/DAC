<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iframe Layout</title>

    <style>
        body {
            margin: 0;
        }

        .container {
            display: flex;
            height: 100vh;
        }

        .left {
            flex: 60%;   /* 40% */
        }
        .mid{
            flex: 20%;
        }

        .right {
            flex:20%;   /* 60% */
    
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="left">
        <iframe src="../Day1/basic.html" title="YouTube"></iframe>
    </div>
        <div class="mid">
        <iframe src="../Day1/pet.html" title="Google"></iframe>
    </div>
    <div class="right">
        <iframe src="../Day1/pet.html" title="Google"></iframe>
    </div>
</div>

</body>
</html>
